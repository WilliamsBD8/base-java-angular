<div class="authentication-wrapper authentication-cover">
  <div class="authentication-inner row m-0">
    <div class="d-none d-lg-flex col-lg-7 col-xl-8 align-items-center p-5">
      <div class="w-100 d-flex justify-content-center">
        <div class="text-center">
          <i class="ri-user-add-line text-primary" style="font-size: 6rem;"></i>
          <h3 class="mt-4">Crear cuenta</h3>
          <p class="text-muted">Regístrate para acceder al sistema</p>
        </div>
      </div>
    </div>

    <div class="d-flex col-12 col-lg-5 col-xl-4 align-items-center authentication-bg p-sm-12 p-6">
      <div class="w-px-400 mx-auto">
        <h4 class="mb-1">Registro</h4>
        <p class="mb-6">Completa tus datos</p>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="mb-4">
            <label class="form-label" for="name">Nombre completo</label>
            <input id="name" type="text" class="form-control" formControlName="name" />
          </div>

          <div class="mb-4">
            <label class="form-label" for="email">Correo electrónico</label>
            <input id="email" type="email" class="form-control" formControlName="email" />
          </div>

          <div class="mb-4">
            <label class="form-label" for="password">Contraseña</label>
            <input id="password" type="password" class="form-control" formControlName="password" />
          </div>

          <div class="mb-4">
            <label class="form-label" for="role">Rol</label>
            <select id="role" class="form-select" formControlName="role">
              @for (role of roles; track role.value) {
                <option [value]="role.value">{{ role.label }}</option>
              }
            </select>
          </div>

          <button type="submit" class="btn btn-primary d-grid w-100" [disabled]="loading()">
            @if (loading()) {
              <span class="spinner-border spinner-border-sm me-2"></span>
            }
            Registrarse
          </button>
        </form>

        <p class="text-center mt-4">
          <span>¿Ya tienes cuenta?</span>
          <a routerLink="/login"> Inicia sesión</a>
        </p>
      </div>
    </div>
  </div>
</div>
