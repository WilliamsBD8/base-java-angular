<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0">{{ isEdit() ? 'Editar convocatoria' : 'Nueva convocatoria' }}</h4>
  <a routerLink="/convocations" class="btn btn-outline-secondary">Volver</a>
</div>

<div class="card">
  <div class="card-body">
    @if (loading()) {
      <div class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" formControlName="name" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Cupos</label>
            <input type="number" class="form-control" formControlName="quota" min="1" />
          </div>
          <div class="col-12">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" rows="3" formControlName="description"></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label">Fecha inicial</label>
            <input type="datetime-local" class="form-control" formControlName="initialDate" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Fecha final</label>
            <input type="datetime-local" class="form-control" formControlName="finalDate" />
          </div>
          <div class="col-12">
            <label class="form-label d-block mb-2">Categorías</label>
            <div class="row g-2">
              @for (category of categories(); track category.id) {
                <div class="col-md-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      [id]="'category-' + category.id"
                      [checked]="isCategorySelected(category.id)"
                      (change)="toggleCategory(category.id, $any($event.target).checked)"
                    />
                    <label class="form-check-label" [for]="'category-' + category.id">
                      {{ category.name }}
                    </label>
                  </div>
                </div>
              }
            </div>
          </div>
        </div>

        <div class="mt-4">
          <button type="submit" class="btn btn-primary" [disabled]="saving()">
            {{ isEdit() ? 'Actualizar' : 'Crear convocatoria' }}
          </button>
        </div>
      </form>
    }
  </div>
</div>
